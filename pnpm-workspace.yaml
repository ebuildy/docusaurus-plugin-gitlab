packages:
  - examples/*

# core-js's postinstall only prints a funding banner — no build needed.
allowBuilds:
  core-js: false

# Security overrides for transitive deps (webpack tooling pulled in by Docusaurus).
# serialize-javascript <=7.0.2 has an RCE (GHSA-5c6j-r48x-rmvq, patched 7.0.3)
# and <7.0.5 a DoS (CVE-2026-34043, patched 7.0.5); webpack plugins still ask for ^6.
# uuid <11.1.1 has a buffer bounds issue (GHSA-w5hq-g745-h8pq); only consumer is
# sockjs (webpack-dev-server), which calls v4() — CJS-compatible with uuid 11.
overrides:
  serialize-javascript: ^7.0.7
  uuid: ^11.1.1
